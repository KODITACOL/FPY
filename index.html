<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ramo de Flores Amarillas</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet"/>

  <!-- Estilos -->
  <link rel="stylesheet" href="Styles.css"/>
</head>
<body>

  <!-- Contenedor principal -->
  <div class="escena">

    <!-- Texto superior -->
    <div class="texto-principal">
      <h1>Un ramo con<em>cariño</em> para ti</h1>
      <p>Feliz dia pendeja 🌻</p>
    </div>

    <!-- Ramo SVG -->
    <svg
      class="ramo-svg"
      viewBox="0 0 460 520"
      xmlns="http://www.w3.org/2000/svg"
      aria-label="Ramo de flores amarillas"
      role="img"
    >
      <defs>
        <radialGradient id="gPetaloCentral" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#FFEC6E"/>
          <stop offset="100%" stop-color="#E8A800"/>
        </radialGradient>
        <radialGradient id="gCentro" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#6B3A00"/>
          <stop offset="100%" stop-color="#3D1F00"/>
        </radialGradient>
        <radialGradient id="gCentro2" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#8B5E2A"/>
          <stop offset="100%" stop-color="#4A2800"/>
        </radialGradient>
        <linearGradient id="gTallo" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#2D5A3D"/>
          <stop offset="100%" stop-color="#4A7C59"/>
        </linearGradient>
        <linearGradient id="gLazo" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#FFEC6E"/>
          <stop offset="100%" stop-color="#E8A800"/>
        </linearGradient>
        <filter id="sombra">
          <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.15"/>
        </filter>
        <filter id="sombra-suave">
          <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.1"/>
        </filter>
      </defs>

      <g class="ramo-grupo">

        <!-- TALLOS -->
        <line x1="230" y1="430" x2="200" y2="290" stroke="url(#gTallo)" stroke-width="6" stroke-linecap="round"/>
        <line x1="230" y1="430" x2="230" y2="280" stroke="url(#gTallo)" stroke-width="6" stroke-linecap="round"/>
        <line x1="230" y1="430" x2="258" y2="295" stroke="url(#gTallo)" stroke-width="6" stroke-linecap="round"/>
        <line x1="230" y1="430" x2="170" y2="310" stroke="url(#gTallo)" stroke-width="5" stroke-linecap="round"/>
        <line x1="230" y1="430" x2="285" y2="305" stroke="url(#gTallo)" stroke-width="5" stroke-linecap="round"/>
        <line x1="230" y1="430" x2="155" y2="340" stroke="url(#gTallo)" stroke-width="4" stroke-linecap="round"/>
        <line x1="230" y1="430" x2="300" y2="335" stroke="url(#gTallo)" stroke-width="4" stroke-linecap="round"/>

        <!-- HOJAS -->
        <ellipse cx="215" cy="355" rx="22" ry="10" fill="#4A7C59" transform="rotate(-35 215 355)" opacity="0.9"/>
        <ellipse cx="248" cy="360" rx="22" ry="10" fill="#2D5A3D" transform="rotate(30 248 360)" opacity="0.9"/>
        <ellipse cx="185" cy="375" rx="18" ry="8"  fill="#4A7C59" transform="rotate(-40 185 375)" opacity="0.8"/>
        <ellipse cx="272" cy="372" rx="18" ry="8"  fill="#2D5A3D" transform="rotate(40 272 372)"  opacity="0.8"/>

        <!-- FLOR CENTRAL GRANDE -->
        <g class="petalo-brillo" transform="translate(230,210)" filter="url(#sombra)">
          <ellipse cx="0" cy="-42" rx="13" ry="28" fill="#F5C518" transform="rotate(0)"/>
          <ellipse cx="0" cy="-42" rx="13" ry="28" fill="#F5C518" transform="rotate(45)"/>
          <ellipse cx="0" cy="-42" rx="13" ry="28" fill="#FFEC6E" transform="rotate(90)"/>
          <ellipse cx="0" cy="-42" rx="13" ry="28" fill="#FFEC6E" transform="rotate(135)"/>
          <ellipse cx="0" cy="-42" rx="13" ry="28" fill="#F5C518" transform="rotate(180)"/>
          <ellipse cx="0" cy="-42" rx="13" ry="28" fill="#F5C518" transform="rotate(225)"/>
          <ellipse cx="0" cy="-42" rx="13" ry="28" fill="#FFEC6E" transform="rotate(270)"/>
          <ellipse cx="0" cy="-42" rx="13" ry="28" fill="#FFEC6E" transform="rotate(315)"/>
          <circle cx="0" cy="0" r="22" fill="url(#gCentro)"/>
          <circle cx="0" cy="0" r="14" fill="#5A2D00" opacity="0.5"/>
          <circle cx="-4" cy="-4" r="3" fill="#FFD700" opacity="0.4"/>
        </g>

        <!-- FLOR IZQUIERDA -->
        <g class="petalo-brillo" transform="translate(175,250)" filter="url(#sombra-suave)">
          <ellipse cx="0" cy="-34" rx="11" ry="22" fill="#E8A800" transform="rotate(0)"/>
          <ellipse cx="0" cy="-34" rx="11" ry="22" fill="#F5C518" transform="rotate(51.4)"/>
          <ellipse cx="0" cy="-34" rx="11" ry="22" fill="#FFEC6E" transform="rotate(102.8)"/>
          <ellipse cx="0" cy="-34" rx="11" ry="22" fill="#F5C518" transform="rotate(154.2)"/>
          <ellipse cx="0" cy="-34" rx="11" ry="22" fill="#E8A800" transform="rotate(205.6)"/>
          <ellipse cx="0" cy="-34" rx="11" ry="22" fill="#FFEC6E" transform="rotate(257)"/>
          <ellipse cx="0" cy="-34" rx="11" ry="22" fill="#F5C518" transform="rotate(308.4)"/>
          <circle cx="0" cy="0" r="17" fill="url(#gCentro2)"/>
          <circle cx="0" cy="0" r="10" fill="#3D1F00" opacity="0.5"/>
        </g>

        <!-- FLOR DERECHA -->
        <g class="petalo-brillo" transform="translate(285,250)" filter="url(#sombra-suave)">
          <ellipse cx="0" cy="-34" rx="11" ry="22" fill="#F5C518" transform="rotate(0)"/>
          <ellipse cx="0" cy="-34" rx="11" ry="22" fill="#FFEC6E" transform="rotate(51.4)"/>
          <ellipse cx="0" cy="-34" rx="11" ry="22" fill="#E8A800" transform="rotate(102.8)"/>
          <ellipse cx="0" cy="-34" rx="11" ry="22" fill="#FFEC6E" transform="rotate(154.2)"/>
          <ellipse cx="0" cy="-34" rx="11" ry="22" fill="#F5C518" transform="rotate(205.6)"/>
          <ellipse cx="0" cy="-34" rx="11" ry="22" fill="#E8A800" transform="rotate(257)"/>
          <ellipse cx="0" cy="-34" rx="11" ry="22" fill="#FFEC6E" transform="rotate(308.4)"/>
          <circle cx="0" cy="0" r="17" fill="url(#gCentro)"/>
          <circle cx="0" cy="0" r="10" fill="#3D1F00" opacity="0.5"/>
        </g>

        <!-- FLOR IZQUIERDA EXTERIOR -->
        <g class="petalo-brillo" transform="translate(148,285)" filter="url(#sombra-suave)">
          <ellipse cx="0" cy="-27" rx="9" ry="18" fill="#FFEC6E" transform="rotate(0)"/>
          <ellipse cx="0" cy="-27" rx="9" ry="18" fill="#F5C518" transform="rotate(60)"/>
          <ellipse cx="0" cy="-27" rx="9" ry="18" fill="#E8A800" transform="rotate(120)"/>
          <ellipse cx="0" cy="-27" rx="9" ry="18" fill="#FFEC6E" transform="rotate(180)"/>
          <ellipse cx="0" cy="-27" rx="9" ry="18" fill="#F5C518" transform="rotate(240)"/>
          <ellipse cx="0" cy="-27" rx="9" ry="18" fill="#E8A800" transform="rotate(300)"/>
          <circle cx="0" cy="0" r="13" fill="url(#gCentro2)"/>
        </g>

        <!-- FLOR DERECHA EXTERIOR -->
        <g class="petalo-brillo" transform="translate(312,285)" filter="url(#sombra-suave)">
          <ellipse cx="0" cy="-27" rx="9" ry="18" fill="#F5C518" transform="rotate(0)"/>
          <ellipse cx="0" cy="-27" rx="9" ry="18" fill="#FFEC6E" transform="rotate(60)"/>
          <ellipse cx="0" cy="-27" rx="9" ry="18" fill="#F5C518" transform="rotate(120)"/>
          <ellipse cx="0" cy="-27" rx="9" ry="18" fill="#E8A800" transform="rotate(180)"/>
          <ellipse cx="0" cy="-27" rx="9" ry="18" fill="#FFEC6E" transform="rotate(240)"/>
          <ellipse cx="0" cy="-27" rx="9" ry="18" fill="#F5C518" transform="rotate(300)"/>
          <circle cx="0" cy="0" r="13" fill="url(#gCentro)"/>
        </g>

        <!-- FLOR PEQUEÑA IZQUIERDA -->
        <g class="petalo-brillo" transform="translate(158,330)" filter="url(#sombra-suave)">
          <ellipse cx="0" cy="-20" rx="7" ry="14" fill="#FFEC6E" transform="rotate(0)"/>
          <ellipse cx="0" cy="-20" rx="7" ry="14" fill="#F5C518" transform="rotate(72)"/>
          <ellipse cx="0" cy="-20" rx="7" ry="14" fill="#E8A800" transform="rotate(144)"/>
          <ellipse cx="0" cy="-20" rx="7" ry="14" fill="#FFEC6E" transform="rotate(216)"/>
          <ellipse cx="0" cy="-20" rx="7" ry="14" fill="#F5C518" transform="rotate(288)"/>
          <circle cx="0" cy="0" r="10" fill="url(#gCentro2)"/>
        </g>

        <!-- FLOR PEQUEÑA DERECHA -->
        <g class="petalo-brillo" transform="translate(302,330)" filter="url(#sombra-suave)">
          <ellipse cx="0" cy="-20" rx="7" ry="14" fill="#F5C518" transform="rotate(0)"/>
          <ellipse cx="0" cy="-20" rx="7" ry="14" fill="#FFEC6E" transform="rotate(72)"/>
          <ellipse cx="0" cy="-20" rx="7" ry="14" fill="#F5C518" transform="rotate(144)"/>
          <ellipse cx="0" cy="-20" rx="7" ry="14" fill="#E8A800" transform="rotate(216)"/>
          <ellipse cx="0" cy="-20" rx="7" ry="14" fill="#FFEC6E" transform="rotate(288)"/>
          <circle cx="0" cy="0" r="10" fill="url(#gCentro)"/>
        </g>

        <!-- PAPEL ENVOLVENTE -->
        <path d="M170,430 Q180,400 190,380 L270,380 Q280,400 290,430 Z"
              fill="#FFFBF0" stroke="#E8D08A" stroke-width="1.5" opacity="0.9"/>
        <path d="M160,440 Q175,415 185,395 L275,395 Q285,415 300,440 Z"
              fill="#FFF8D6" stroke="#D4B86A" stroke-width="1.5" opacity="0.8"/>

        <!-- LAZO -->
        <ellipse cx="210" cy="410" rx="30" ry="16" fill="url(#gLazo)" transform="rotate(-25 210 410)" opacity="0.95"/>
        <ellipse cx="250" cy="410" rx="30" ry="16" fill="#F5C518"    transform="rotate(25 250 410)"  opacity="0.95"/>
        <circle cx="230" cy="413" r="10" fill="#E8A800"/>
        <circle cx="230" cy="413" r="6"  fill="#FFD740"/>
        <path d="M225,420 Q215,440 210,460" stroke="#E8A800" stroke-width="5" fill="none" stroke-linecap="round"/>
        <path d="M235,420 Q245,440 250,460" stroke="#F5C518" stroke-width="5" fill="none" stroke-linecap="round"/>

      </g>
    </svg>

    <!-- Cinta inferior decorativa -->
    <div class="cinta">
      <div class="cinta-linea">
        <span class="cinta-texto">Sigue asi </span>
      </div>
      <div class="estrellas">✦ ✦ ✦</div>
    </div>

  </div><!-- /.escena -->

  <!-- JavaScript -->
  <script src="Script.js"></script>

</body>
</html>
